<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Main heading of the application -->
  <h1>WORDLY DICTIONARY</h1>

  <!-- FORM for searching a word -->
  <form id="search-form">
    <input 
      type="text" 
      id="word-input" 
      placeholder="Enter a word" 
      required
      
    >
    <button type="submit">Search</button>
    <!-- Button to trigger search -->
  </form>
  
  <!-- ERROR MESSAGE DISPLAY -->
  <div id="error-message" class="hidden"></div>

  <!-- RESULT DISPLAY AREA -->
  <div id="result">
    <!-- JavaScript will insert word data here -->
  </div>
  
  <!-- THE LINK TO JAVASCRIPT FILE -->
  <script src="index.js"></script>
</body>
</html>
